<!DOCTYPE html>
<html>
    <body>
        <pre id="out"></pre>

        <script>
            async function update() {
                const t = Date.now();

                const [u1, u2] = await Promise.all([
                    fetch("U1.txt?x=" + t).then(r => r.text()),
                    fetch("U2.txt?x=" + t).then(r => r.text())
                ]);

                document.getElementById("out").textContent =
                    "U1:\n" + u1 + "\n\nU2:\n" + u2;
            }

            update();
            setInterval(update, 2000);
        </script>
    </body>
</html>
